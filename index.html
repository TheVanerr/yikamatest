<!doctype html>
<html lang="tr">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=yikamatst.html">
  <title>Yönlendiriliyor...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script>
    window.location.href = "yikamatst.html";
  </script>
 </head>
 <body>
  <div class="loader">
   <div class="spinner"></div>
   <p>Yönlendiriliyor...</p>
   <p style="font-size: 14px; opacity: 0.7;">Otomatik yönlendirme çalışmazsa <a href="yikamatst.html" style="color: #6366f1;">buraya tıklayın</a></p>
  </div>
 </body>
</html>
